name: Keep GitHub Repo Alive

on:
  schedule:
    # 每 15 天运行一次 (凌晨 0 点)
    - cron: '0 0 */15 * *'
  workflow_dispatch: # 允许你手动点击运行，方便测试

jobs:
  keepalive:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 必须赋予写入权限，否则 push 会失败
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Keepalive Workflow
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          echo "Last heartbeat: $(date)" > heartbeat.txt
          git add heartbeat.txt
          git commit -m "chore: workflow keepalive [skip ci]" || echo "No changes to commit"
          git push
